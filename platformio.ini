; M5StickC Plus2 / Plus 1.1 – DJI Osmo Action remote
; Use env:m5stickc_plus2 for Plus2, env:m5stickc_plus11 for Plus 1.1

[platformio]
src_dir = main

; ----- M5Stick C Plus2 (default) -----
[env:m5stickc_plus2]
platform = espressif32
framework = espidf
board = m5stick-c
monitor_speed = 115200
upload_speed = 500000

; ----- M5Stick C Plus 1.1 (different LCD pins: DC=23, RST=18) -----
[env:m5stickc_plus11]
platform = espressif32
framework = espidf
board = m5stick-c
monitor_speed = 115200
upload_speed = 500000
; upload_port = /dev/cu.usbserial-XXXX   ; uncomment and set if auto-detect fails
board_build.cmake_extra_args = -DM5STICKC_PLUS_11_BUILD=ON
